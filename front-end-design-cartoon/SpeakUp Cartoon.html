<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SpeakUp — Cartoon Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,800;9..144,900&family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cream: '#FFF6E5',
          paper: '#FFFFFF',
          ink: '#1F1A2E',
          'ink-2': '#5C4E6F',
          'ink-3': '#8E7FA3',
          line: '#1F1A2E',
          coral: '#FF6B6B',
          'coral-d': '#E8434E',
          peach: '#FFB57A',
          sun: '#FFD93D',
          mint: '#6BCB77',
          'mint-d': '#3FA94F',
          sky: '#5DADEC',
          grape: '#B58CFF',
          'grape-d': '#8C5BFF',
          rose: '#FF8FA3',
        },
        fontFamily: {
          display: ['Fraunces', 'Georgia', 'serif'],
          sans: ['Nunito', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
        boxShadow: {
          'pop': '4px 4px 0 0 #1F1A2E',
          'pop-lg': '6px 6px 0 0 #1F1A2E',
          'pop-xl': '8px 8px 0 0 #1F1A2E',
          'pop-coral': '4px 4px 0 0 #E8434E',
          'pop-mint': '4px 4px 0 0 #3FA94F',
          'pop-grape': '4px 4px 0 0 #8C5BFF',
        }
      }
    }
  }
</script>
<style>
  html, body { background: #FFF6E5; color: #1F1A2E; }
  body { font-family: 'Nunito', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Fraunces', Georgia, serif; font-variation-settings: 'opsz' 144; letter-spacing: -0.02em; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* Sticker card — chunky border + offset shadow */
  .sticker { border: 2px solid #1F1A2E; box-shadow: 4px 4px 0 0 #1F1A2E; background: #FFFFFF; border-radius: 20px; }
  .sticker-lg { border: 2px solid #1F1A2E; box-shadow: 6px 6px 0 0 #1F1A2E; background: #FFFFFF; border-radius: 24px; }
  .sticker-flat { border: 2px solid #1F1A2E; background: #FFFFFF; border-radius: 18px; }
  .lift-pop { transition: transform 180ms cubic-bezier(.2,.7,.2,1), box-shadow 180ms; }
  .lift-pop:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 0 #1F1A2E; }
  .press:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 0 #1F1A2E !important; }

  /* Confetti dot pattern */
  .bg-dots {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(31,26,46,0.18) 1.2px, transparent 1.2px);
    background-size: 14px 14px;
  }
  .bg-paper-noise {
    background-color: #FFF6E5;
    background-image:
      radial-gradient(circle at 20% 12%, #FFD93D33 0%, transparent 24%),
      radial-gradient(circle at 80% 8%, #FF8FA333 0%, transparent 22%),
      radial-gradient(circle at 92% 88%, #6BCB7733 0%, transparent 26%),
      radial-gradient(circle at 12% 90%, #B58CFF33 0%, transparent 22%);
  }

  /* Squiggly underline */
  .squiggle {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 12' preserveAspectRatio='none'><path d='M0 6 Q 10 0 20 6 T 40 6 T 60 6 T 80 6' stroke='%23FF6B6B' stroke-width='3' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-size: 100% 0.5em;
    background-position: 0 100%;
    padding-bottom: 0.18em;
  }

  /* Highlight marker */
  .marker-sun  { background: linear-gradient(180deg, transparent 60%, #FFD93D 60%); padding: 0 2px; }
  .marker-mint { background: linear-gradient(180deg, transparent 60%, #6BCB7766 60%); padding: 0 2px; }
  .marker-coral{ background: linear-gradient(180deg, transparent 60%, #FF6B6B33 60%); padding: 0 2px; }
  .marker-rose { background: linear-gradient(180deg, transparent 60%, #FF8FA366 60%); padding: 0 2px; }

  /* Wiggle for emoji */
  @keyframes wiggle { 0%, 100% { transform: rotate(-4deg);} 50% { transform: rotate(4deg);} }
  .wiggle { animation: wiggle 1.4s ease-in-out infinite; display: inline-block; }
  @keyframes bounce-soft { 0%, 100% { transform: translateY(0);} 50% { transform: translateY(-4px);} }
  .bouncy { animation: bounce-soft 1.6s ease-in-out infinite; display: inline-block; }
  @keyframes float { 0%, 100% { transform: translateY(0) rotate(0);} 50% { transform: translateY(-6px) rotate(2deg);} }
  .floaty { animation: float 4s ease-in-out infinite; display: inline-block; }

  /* Wave bars for cartoon */
  @keyframes cwave {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }
  .cwave-bar { animation: cwave 0.9s ease-in-out infinite; transform-origin: center; }

  /* Recording pulse */
  @keyframes recPulse2 {
    0%, 100% { box-shadow: 4px 4px 0 0 #1F1A2E, 0 0 0 0 rgba(255,107,107,0.6); }
    50% { box-shadow: 4px 4px 0 0 #1F1A2E, 0 0 0 16px rgba(255,107,107,0); }
  }
  .rec-pulse2 { animation: recPulse2 1.4s ease-out infinite; }

  /* Selected state */
  .selected-yay { border-color: #1F1A2E; background: #FFD93D; box-shadow: 6px 6px 0 0 #1F1A2E; transform: translate(-2px, -2px); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: #FFF6E5; }
  ::-webkit-scrollbar-thumb { background: #1F1A2E; border-radius: 8px; border: 3px solid #FFF6E5; }

  .fade-enter { animation: fadeIn 360ms ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none;} }

  @keyframes pop-in {
    0% { transform: scale(0.7) rotate(-8deg); opacity: 0; }
    60% { transform: scale(1.08) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .pop-in2 { animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

  /* Heatmap cells */
  .ch-0 { background: #FFFFFF; border: 1.5px solid #1F1A2E; }
  .ch-1 { background: #FFE9A8; border: 1.5px solid #1F1A2E; }
  .ch-2 { background: #FFD93D; border: 1.5px solid #1F1A2E; }
  .ch-3 { background: #FF8FA3; border: 1.5px solid #1F1A2E; }
  .ch-4 { background: #6BCB77; border: 1.5px solid #1F1A2E; }

  /* Ring draw */
  @keyframes ringDraw2 {
    from { stroke-dashoffset: var(--circ); }
    to { stroke-dashoffset: var(--target); }
  }
  .ring-anim2 { animation: ringDraw2 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
</style>
</head>
<body class="min-h-screen bg-cream text-ink">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src-cartoon/primitives.jsx"></script>
  <script type="text/babel" src="src-cartoon/screens.jsx"></script>
  <script type="text/babel" src="src-cartoon/app.jsx"></script>
</body>
</html>
