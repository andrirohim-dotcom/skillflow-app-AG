<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SpeakUp — AI Public Speaking Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: '#0A0A0F',
          surface: '#111118',
          'surface-2': '#16161F',
          'surface-3': '#1A1A26',
          border: '#1E1E2E',
          'border-2': '#2A2A3D',
          primary: '#4F6EF7',
          secondary: '#7C3AED',
          success: '#10B981',
          warning: '#F59E0B',
          error: '#F43F5E',
          'text-1': '#F1F5F9',
          'text-2': '#94A3B8',
          'text-3': '#64748B',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
        borderRadius: {
          card: '16px',
          btn: '12px',
          input: '8px',
        },
        boxShadow: {
          'glow-primary': '0 8px 32px -8px rgba(79, 110, 247, 0.45)',
          'glow-secondary': '0 8px 32px -8px rgba(124, 58, 237, 0.45)',
          'glow-success': '0 8px 24px -8px rgba(16, 185, 129, 0.45)',
          'glow-warning': '0 8px 24px -8px rgba(245, 158, 11, 0.45)',
          'glow-error': '0 8px 24px -8px rgba(244, 63, 94, 0.45)',
        }
      }
    }
  }
</script>
<style>
  html, body { background: #0A0A0F; color: #F1F5F9; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* Subtle grid for hero background */
  .bg-grid {
    background-image:
      linear-gradient(rgba(79,110,247,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,110,247,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Gradient text */
  .grad-text {
    background: linear-gradient(135deg, #4F6EF7 0%, #7C3AED 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .grad-bg { background: linear-gradient(135deg, #4F6EF7 0%, #7C3AED 100%); }
  .grad-bg-soft { background: linear-gradient(135deg, rgba(79,110,247,0.18) 0%, rgba(124,58,237,0.18) 100%); }

  /* Glass card */
  .glass {
    background: rgba(17, 17, 24, 0.7);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(42, 42, 61, 0.6);
  }

  /* XP bar pulse */
  @keyframes xpGlow {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(79,110,247,0.5)) drop-shadow(0 0 12px rgba(124,58,237,0.3)); }
    50% { filter: drop-shadow(0 0 12px rgba(79,110,247,0.8)) drop-shadow(0 0 24px rgba(124,58,237,0.5)); }
  }
  .xp-glow { animation: xpGlow 2.4s ease-in-out infinite; }

  /* Streak flame */
  @keyframes flameWobble {
    0%, 100% { transform: rotate(-3deg) scale(1); }
    50% { transform: rotate(3deg) scale(1.05); }
  }
  .flame { animation: flameWobble 1.6s ease-in-out infinite; display: inline-block; }

  /* Waveform bars */
  @keyframes wave {
    0%, 100% { transform: scaleY(0.25); }
    50% { transform: scaleY(1); }
  }
  .wave-bar { animation: wave 1s ease-in-out infinite; transform-origin: center; }

  /* Recording pulse */
  @keyframes recPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.55); }
    50% { box-shadow: 0 0 0 24px rgba(244, 63, 94, 0); }
  }
  .rec-pulse { animation: recPulse 1.6s ease-out infinite; }

  /* Score count-up */
  @keyframes ringDraw {
    from { stroke-dashoffset: var(--circ); }
    to { stroke-dashoffset: var(--target); }
  }
  .ring-anim { animation: ringDraw 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

  /* Confetti / celebration */
  @keyframes pop {
    0% { transform: translateY(8px) scale(0.9); opacity: 0; }
    60% { transform: translateY(-2px) scale(1.04); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .pop-in { animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

  /* Selected card glow */
  .selected-glow {
    box-shadow: 0 0 0 1.5px #4F6EF7, 0 0 24px -4px rgba(79,110,247,0.6), 0 0 48px -12px rgba(124,58,237,0.4);
  }

  /* Tab indicator */
  .tab-active { color: #F1F5F9; background: linear-gradient(135deg, rgba(79,110,247,0.18), rgba(124,58,237,0.18)); border-color: #2A2A3D; }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0A0A0F; }
  ::-webkit-scrollbar-thumb { background: #1E1E2E; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #2A2A3D; }

  /* Heatmap cells */
  .hm-0 { background: #16161F; }
  .hm-1 { background: rgba(79,110,247,0.18); }
  .hm-2 { background: rgba(79,110,247,0.36); }
  .hm-3 { background: rgba(79,110,247,0.6); }
  .hm-4 { background: rgba(124,58,237,0.85); }

  /* Hover lift */
  .lift { transition: transform 240ms cubic-bezier(.2,.7,.2,1), box-shadow 240ms; }
  .lift:hover { transform: translateY(-2px); }

  /* Spinner-free smooth fade */
  .fade-enter { animation: fadeIn 360ms ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none;} }

  /* Fix for tab buttons bg on hover */
  .tab-btn:hover { background: rgba(30,30,46,0.5); color: #F1F5F9; }
</style>
</head>
<body class="min-h-screen bg-bg text-text-1">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/landing.jsx"></script>
  <script type="text/babel" src="src/dashboard.jsx"></script>
  <script type="text/babel" src="src/practice.jsx"></script>
  <script type="text/babel" src="src/onboarding.jsx"></script>
  <script type="text/babel" src="src/progress.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
