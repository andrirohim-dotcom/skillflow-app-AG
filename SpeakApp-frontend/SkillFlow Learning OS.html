<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillFlow Learning OS · v0.5.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg-0:#070710;
    --bg-1:#0b0b16;
    --bg-2:#10101e;
    --surface:rgba(20,20,34,.6);
    --surface-strong:rgba(28,28,46,.85);
    --line:rgba(255,255,255,.07);
    --line-strong:rgba(255,255,255,.14);
    --text:#e7e7f3;
    --text-dim:#9c9cb3;
    --text-mute:#6b6b85;
    --indigo:#6366f1;
    --indigo-2:#818cf8;
    --violet:#a78bfa;
    --cyan:#14b8a6;
    --cyan-2:#22d3ee;
    --amber:#f59e0b;
    --amber-2:#fbbf24;
    --rose:#f43f5e;
    --green:#22c55e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 700px at 8% -10%, rgba(99,102,241,.18), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(20,184,166,.10), transparent 55%),
      radial-gradient(700px 500px at 60% 110%, rgba(245,158,11,.10), transparent 60%),
      linear-gradient(180deg,#070710 0%, #050509 100%);
    background-attachment: fixed;
  }
  h1,h2,h3,h4{font-family:'Outfit',sans-serif;letter-spacing:-.01em;margin:0}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.02em}
  ::selection{background:rgba(99,102,241,.4);color:#fff}

  /* scrollbars */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:99px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.14)}

  /* shared glass */
  .glass{
    background: linear-gradient(180deg, rgba(28,28,46,.7), rgba(16,16,30,.55));
    border:1px solid var(--line);
    border-radius:24px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 20px 60px -30px rgba(0,0,0,.6);
  }
  .glass-soft{
    background: linear-gradient(180deg, rgba(28,28,46,.45), rgba(16,16,30,.35));
    border:1px solid var(--line);
    border-radius:18px;
    backdrop-filter: blur(14px) saturate(130%);
  }
  .ring-indigo{box-shadow:0 0 0 1px rgba(99,102,241,.45), 0 12px 40px -12px rgba(99,102,241,.55), inset 0 1px 0 rgba(255,255,255,.06)}
  .ring-cyan  {box-shadow:0 0 0 1px rgba(20,184,166,.45), 0 12px 40px -12px rgba(20,184,166,.55), inset 0 1px 0 rgba(255,255,255,.06)}
  .ring-amber {box-shadow:0 0 0 1px rgba(245,158,11,.45), 0 12px 40px -12px rgba(245,158,11,.55), inset 0 1px 0 rgba(255,255,255,.06)}

  /* gradient text utility */
  .grad-indigo{background:linear-gradient(135deg,#818cf8,#a78bfa 60%,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
  .grad-cyan{background:linear-gradient(135deg,#22d3ee,#14b8a6);-webkit-background-clip:text;background-clip:text;color:transparent}
  .grad-amber{background:linear-gradient(135deg,#fbbf24,#f59e0b 60%,#f43f5e);-webkit-background-clip:text;background-clip:text;color:transparent}

  /* xp shimmer */
  @keyframes xpFlow{
    0%{background-position:0% 50%} 100%{background-position:200% 50%}
  }
  .xp-fill{
    background: linear-gradient(90deg, #6366f1, #a78bfa, #22d3ee, #14b8a6, #6366f1);
    background-size: 200% 100%;
    animation: xpFlow 5s linear infinite;
    box-shadow: 0 0 14px rgba(129,140,248,.6), 0 0 32px rgba(34,211,238,.35);
  }

  @keyframes pulseGlow {
    0%,100%{ filter: drop-shadow(0 0 4px currentColor) drop-shadow(0 0 10px currentColor); opacity:1 }
    50%   { filter: drop-shadow(0 0 2px currentColor) drop-shadow(0 0 4px currentColor);  opacity:.85 }
  }
  .node-glow{ animation: pulseGlow 3.5s ease-in-out infinite }

  @keyframes float-y { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .floaty{ animation: float-y 4s ease-in-out infinite }

  @keyframes shineX { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }

  /* hover micro-interactions */
  .lift{ transition: transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease, border-color .3s ease, background .3s ease }
  .lift:hover{ transform: translateY(-2px) }

  .chip{
    display:inline-flex; align-items:center; gap:6px;
    padding: 4px 10px; border-radius: 999px;
    border:1px solid var(--line-strong);
    background: rgba(255,255,255,.03);
    font-size: 11px; font-weight:500; color: var(--text-dim);
    letter-spacing:.02em;
  }
  .chip .dot{ width:6px; height:6px; border-radius:99px; background:currentColor }

  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding: 10px 16px; border-radius: 14px;
    border:1px solid var(--line-strong);
    background: rgba(255,255,255,.04);
    color: var(--text); font-weight:500; font-size: 13px;
    cursor:pointer; transition: all .25s ease;
    font-family:inherit;
  }
  .btn:hover{ background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.22)}
  .btn-primary{
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-color: rgba(129,140,248,.5);
    box-shadow: 0 8px 30px -10px rgba(99,102,241,.7), inset 0 1px 0 rgba(255,255,255,.2);
    color:#fff;
  }
  .btn-primary:hover{ filter: brightness(1.1) }
  .btn-cyan{
    background: linear-gradient(135deg, #14b8a6, #0891b2);
    border-color: rgba(34,211,238,.5);
    box-shadow: 0 8px 30px -10px rgba(20,184,166,.7), inset 0 1px 0 rgba(255,255,255,.2);
    color:#fff;
  }
  .btn-amber{
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border-color: rgba(245,158,11,.5);
    box-shadow: 0 8px 30px -10px rgba(245,158,11,.6), inset 0 1px 0 rgba(255,255,255,.2);
    color:#1a1206; font-weight:600;
  }

  /* checkbox */
  .check{
    width:18px; height:18px; border-radius:6px; flex-shrink:0;
    border:1px solid var(--line-strong);
    background: rgba(255,255,255,.03);
    display:inline-flex; align-items:center; justify-content:center;
    cursor:pointer; transition: all .25s ease;
  }
  .check.on{
    background: linear-gradient(135deg, #14b8a6, #22d3ee);
    border-color: rgba(34,211,238,.5);
    box-shadow: 0 0 14px rgba(20,184,166,.4);
  }
  .check svg{ opacity:0; transition: opacity .2s ease }
  .check.on svg{ opacity:1 }

  /* tab */
  .tab{
    padding:10px 14px; border-radius: 12px;
    color: var(--text-dim); font-size: 13px; font-weight: 500;
    cursor:pointer; transition:all .25s ease;
    border:1px solid transparent;
  }
  .tab:hover{ color: var(--text); background: rgba(255,255,255,.04) }
  .tab.active{
    color: var(--text);
    background: linear-gradient(180deg, rgba(99,102,241,.18), rgba(99,102,241,.06));
    border-color: rgba(129,140,248,.35);
    box-shadow: 0 0 0 1px rgba(129,140,248,.08), inset 0 1px 0 rgba(255,255,255,.05);
  }

  /* layout */
  .app{
    display:grid;
    grid-template-columns: 256px 1fr;
    min-height: 100vh;
  }
  .main-wrap{
    display:flex; flex-direction: column;
    min-height: 100vh;
    min-width: 0;
  }
  .content{
    padding: 28px 36px 80px;
    max-width: 1480px;
    width: 100%;
    margin: 0 auto;
  }

  @media (max-width: 900px){
    .app{ grid-template-columns: 1fr }
    .content{ padding: 20px 16px 100px }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src-skillflow/icons.jsx"></script>
<script type="text/babel" src="src-skillflow/primitives.jsx"></script>
<script type="text/babel" src="src-skillflow/shell.jsx"></script>
<script type="text/babel" src="src-skillflow/dashboard.jsx"></script>
<script type="text/babel" src="src-skillflow/catalog.jsx"></script>
<script type="text/babel" src="src-skillflow/skilltree.jsx"></script>
<script type="text/babel" src="src-skillflow/profile.jsx"></script>
<script type="text/babel" src="src-skillflow/app.jsx"></script>
</body>
</html>
